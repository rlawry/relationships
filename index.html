<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Climate Relationship Quiz</title>
  <style>
    :root { --bg:#f3f7fb; --panel:#fff; --ink:#1f2937; --muted:#6b7280; --line:#cbd5e1; --accent:#1d4ed8; --good:#166534; --bad:#991b1b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:1100px; margin:24px auto; padding:16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,.06); padding:18px; }
    h1 { margin:0 0 10px; font-size:30px; }
    p.topnote { margin:0 0 18px; color:var(--muted); line-height:1.4; }
    .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
    button { border:1px solid #94a3b8; background:#f8fafc; color:var(--ink); padding:10px 14px; border-radius:10px; cursor:pointer; font-size:15px; }
    button:hover { background:#eef2ff; border-color:var(--accent); }
    .graphPanel { overflow-x:auto; margin-bottom:18px; }
    svg { display:block; width:100%; min-width:860px; height:auto; background:#fff; border:1px solid var(--line); border-radius:12px; }
    .question { margin-top:14px; margin-bottom:10px; font-size:18px; font-weight:700; }
    .options { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-top:8px; }
    .optionBtn { text-align:left; padding:12px 14px; min-height:56px; }
    .feedback { margin-top:14px; padding:12px 14px; border-radius:10px; display:none; font-weight:700; }
    .feedback.good { display:block; background:#dcfce7; color:var(--good); border:1px solid #86efac; }
    .feedback.bad { display:block; background:#fee2e2; color:var(--bad); border:1px solid #fca5a5; }
    .meta { margin-top:16px; padding-top:12px; border-top:1px solid var(--line); color:var(--muted); font-size:14px; line-height:1.4; }
    .titleBox { margin-bottom:10px; font-size:19px; font-weight:700; line-height:1.35; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Relationship Graph Quiz</h1>
      <p class="topnote">A graph is shown for one invented climate/agricultural variable relationship. Examine the graph, then choose the relationship type shown.</p>
      <div class="controls">
        <button id="newQuestionBtn">New Relationship</button>
        <button id="revealBtn">Reveal Answer</button>
      </div>
      <div class="titleBox" id="chartTitle"></div>
      <div class="graphPanel"><svg id="chart" viewBox="0 0 900 620" aria-label="relationship graph"></svg></div>
      <div class="question">What type of relationship is shown?</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="meta">Relationship options shown below the graph: linear, proportional, negative linear, quadratic.</div>
    </div>
  </div>

  <script>
    const unitMap = {
      AYCU:"Atmospheric Yield Coherence Unit", TCSI:"Thermal Crop Synchronization Index", VREM:"Vapor Root Efficiency Measure", SMAU:"Solar Moisture Alignment Unit",
      AFQ:"Agroclimatic Flux Quotient", BHSU:"Barometric Harvest Stability Unit", PRCI:"Photosynthetic Rainfall Coupling Index", SEHU:"Seasonal Evapotranspiration Harmony Unit",
      CLRM:"Carbon Loam Responsiveness Measure", RPOU:"Radiative Pasture Optimization Unit", HNTI:"Humidity Nutrient Transfer Index", WPEQ:"Windborne Pollination Efficiency Quotient",
      TCRU:"Thermal Canopy Retention Unit", SAPM:"Soil Albedo Productivity Measure", PBCI:"Precipitation Biomass Coordination Index", CRPU:"Climatic Root Penetration Unit",
      GFSQ:"Greenhouse Field Stability Quotient", AVLU:"Agrothermal Vapor Loading Unit", DGCI:"Dewpoint Grain Conversion Index", IFEM:"Insolation Furrow Efficiency Measure",
      MNDU:"Monsoon Nutrient Diffusion Unit", PHMI:"Pasture Heat Moderation Index", CBLU:"Crop Boundary Layer Utilization Unit", HTRQ:"Hydrologic Tiller Response Quotient",
      CYBU:"Convective Yield Buffer Unit", CPRI:"Canopy Pressure Regulation Index", SMRM:"Soil Moisture Resonance Measure", LHTU:"Latent Harvest Transfer Unit",
      FTIQ:"Field Thermal Inertia Quotient", ASI:"Agrobaric Saturation Index", RCCU:"Root Zone Cloud Coupling Unit", DFMM:"Diurnal Fertility Modulation Measure",
      SMAQ:"Solar Mulch Absorption Quotient", CFPU:"Climate Furrow Persistence Unit", BDRI:"Biomass Dew Retention Index", TGEU:"Transpiration Gradient Efficiency Unit",
      SLAM:"Seasonal Loam Acceleration Measure", RCCU2:"Rainfed Canopy Compression Unit", MPBQ:"Methane Pasture Balance Quotient", AJUI:"Agronomic Jetstream Utilization Index"
    };

    const variableMap = {
      seasonal_atmospheric_yield_coherence:{label:"Seasonal Atmospheric Yield Coherence",unit:"AYCU"},
      thermal_crop_sync_phase:{label:"Thermal Crop Sync Phase",unit:"TCSI"},
      vapor_root_efficiency_score:{label:"Vapor Root Efficiency Score",unit:"VREM"},
      solar_moisture_alignment_factor:{label:"Solar Moisture Alignment Factor",unit:"SMAU"},
      agroclimatic_flux_ratio:{label:"Agroclimatic Flux Ratio",unit:"AFQ"},
      barometric_harvest_stability:{label:"Barometric Harvest Stability",unit:"BHSU"},
      photosynthetic_rainfall_coupling:{label:"Photosynthetic Rainfall Coupling",unit:"PRCI"},
      seasonal_evapotranspiration_harmony:{label:"Seasonal Evapotranspiration Harmony",unit:"SEHU"},
      carbon_loam_responsiveness:{label:"Carbon Loam Responsiveness",unit:"CLRM"},
      radiative_pasture_optimization:{label:"Radiative Pasture Optimization",unit:"RPOU"},
      humidity_nutrient_transfer_rate:{label:"Humidity Nutrient Transfer Rate",unit:"HNTI"},
      windborne_pollination_efficiency:{label:"Windborne Pollination Efficiency",unit:"WPEQ"},
      thermal_canopy_retention:{label:"Thermal Canopy Retention",unit:"TCRU"},
      soil_albedo_productivity:{label:"Soil Albedo Productivity",unit:"SAPM"},
      precipitation_biomass_coordination:{label:"Precipitation Biomass Coordination",unit:"PBCI"},
      climatic_root_penetration_depth:{label:"Climatic Root Penetration Depth",unit:"CRPU"},
      greenhouse_field_stability:{label:"Greenhouse Field Stability",unit:"GFSQ"},
      agrothermal_vapor_loading:{label:"Agrothermal Vapor Loading",unit:"AVLU"},
      dewpoint_grain_conversion:{label:"Dewpoint Grain Conversion",unit:"DGCI"},
      insolation_furrow_efficiency:{label:"Insolation Furrow Efficiency",unit:"IFEM"},
      monsoon_nutrient_diffusion:{label:"Monsoon Nutrient Diffusion",unit:"MNDU"},
      pasture_heat_moderation:{label:"Pasture Heat Moderation",unit:"PHMI"},
      crop_boundary_layer_utilization:{label:"Crop Boundary Layer Utilization",unit:"CBLU"},
      hydrologic_tiller_response:{label:"Hydrologic Tiller Response",unit:"HTRQ"},
      convective_yield_buffer:{label:"Convective Yield Buffer",unit:"CYBU"},
      canopy_pressure_regulation:{label:"Canopy Pressure Regulation",unit:"CPRI"},
      soil_moisture_resonance:{label:"Soil Moisture Resonance",unit:"SMRM"},
      latent_harvest_transfer:{label:"Latent Harvest Transfer",unit:"LHTU"},
      field_thermal_inertia:{label:"Field Thermal Inertia",unit:"FTIQ"},
      agrobaric_saturation_level:{label:"Agrobaric Saturation Level",unit:"ASI"},
      root_zone_cloud_coupling:{label:"Root Zone Cloud Coupling",unit:"RCCU"},
      diurnal_fertility_modulation:{label:"Diurnal Fertility Modulation",unit:"DFMM"},
      solar_mulch_absorption:{label:"Solar Mulch Absorption",unit:"SMAQ"},
      climate_furrow_persistence:{label:"Climate Furrow Persistence",unit:"CFPU"},
      biomass_dew_retention:{label:"Biomass Dew Retention",unit:"BDRI"},
      transpiration_gradient_efficiency:{label:"Transpiration Gradient Efficiency",unit:"TGEU"},
      seasonal_loam_acceleration:{label:"Seasonal Loam Acceleration",unit:"SLAM"},
      rainfed_canopy_compression:{label:"Rainfed Canopy Compression",unit:"RCCU2"},
      methane_pasture_balance:{label:"Methane Pasture Balance",unit:"MPBQ"},
      agronomic_jetstream_utilization:{label:"Agronomic Jetstream Utilization",unit:"AJUI"}
    };

    const relationships = [
      {x:"thermal_crop_sync_phase",y:"seasonal_atmospheric_yield_coherence",type:"linear",fn:x=>1.8*x+12,xRange:[0,40],yRange:[0,100]},
      {x:"thermal_crop_sync_phase",y:"thermal_canopy_retention",type:"proportional",fn:x=>0.75*x,xRange:[0,40],yRange:[0,40]},
      {x:"thermal_canopy_retention",y:"radiative_pasture_optimization",type:"negative linear",fn:x=>-0.6*x+15,xRange:[0,25],yRange:[0,20]},
      {x:"thermal_crop_sync_phase",y:"field_thermal_inertia",type:"quadratic",fn:x=>0.04*x*x+2,xRange:[0,40],yRange:[0,70]},
      {x:"solar_moisture_alignment_factor",y:"soil_moisture_resonance",type:"linear",fn:x=>4.5*x+1,xRange:[0,3],yRange:[0,16]},
      {x:"solar_moisture_alignment_factor",y:"humidity_nutrient_transfer_rate",type:"proportional",fn:x=>3.0*x,xRange:[0,3],yRange:[0,10]},
      {x:"soil_moisture_resonance",y:"soil_albedo_productivity",type:"negative linear",fn:x=>-8.0*x+120,xRange:[0,15],yRange:[0,130]},
      {x:"solar_moisture_alignment_factor",y:"biomass_dew_retention",type:"quadratic",fn:x=>2.2*x*x+5,xRange:[0,7],yRange:[0,120]},
      {x:"agrothermal_vapor_loading",y:"latent_harvest_transfer",type:"linear",fn:x=>2.1*x+4,xRange:[0,20],yRange:[0,50]},
      {x:"agrothermal_vapor_loading",y:"vapor_root_efficiency_score",type:"proportional",fn:x=>0.5*x,xRange:[0,20],yRange:[0,12]},
      {x:"vapor_root_efficiency_score",y:"dewpoint_grain_conversion",type:"negative linear",fn:x=>-30*x+850,xRange:[0,12],yRange:[450,900]},
      {x:"agrothermal_vapor_loading",y:"seasonal_evapotranspiration_harmony",type:"quadratic",fn:x=>0.3*x*x+40,xRange:[0,20],yRange:[0,180]},
      {x:"photosynthetic_rainfall_coupling",y:"precipitation_biomass_coordination",type:"linear",fn:x=>0.22*x+20,xRange:[0,300],yRange:[0,100]},
      {x:"photosynthetic_rainfall_coupling",y:"monsoon_nutrient_diffusion",type:"proportional",fn:x=>0.6*x,xRange:[0,300],yRange:[0,220]},
      {x:"precipitation_biomass_coordination",y:"pasture_heat_moderation",type:"negative linear",fn:x=>-0.5*x+80,xRange:[0,100],yRange:[0,90]},
      {x:"photosynthetic_rainfall_coupling",y:"carbon_loam_responsiveness",type:"quadratic",fn:x=>0.004*x*x+10,xRange:[0,300],yRange:[0,400]},
      {x:"windborne_pollination_efficiency",y:"crop_boundary_layer_utilization",type:"linear",fn:x=>0.005*x+0.2,xRange:[0,400],yRange:[0,3]},
      {x:"windborne_pollination_efficiency",y:"canopy_pressure_regulation",type:"proportional",fn:x=>2.5*x,xRange:[0,40],yRange:[0,110]},
      {x:"crop_boundary_layer_utilization",y:"rainfed_canopy_compression",type:"negative linear",fn:x=>-12*x+42,xRange:[0,3],yRange:[0,44]},
      {x:"windborne_pollination_efficiency",y:"climatic_root_penetration_depth",type:"quadratic",fn:x=>0.0001*x*x+3,xRange:[0,400],yRange:[0,30]},
      {x:"agrobaric_saturation_level",y:"barometric_harvest_stability",type:"linear",fn:x=>0.5*x+5,xRange:[0,100],yRange:[0,60]},
      {x:"agrobaric_saturation_level",y:"greenhouse_field_stability",type:"proportional",fn:x=>0.12*x,xRange:[0,100],yRange:[0,15]},
      {x:"greenhouse_field_stability",y:"convective_yield_buffer",type:"negative linear",fn:x=>-0.9*x+140,xRange:[80,140],yRange:[0,80]},
      {x:"agrobaric_saturation_level",y:"hydrologic_tiller_response",type:"quadratic",fn:x=>0.0006*x*x+20,xRange:[0,100],yRange:[0,40]}
    ];

    const answerOptions = ["linear","proportional","negative linear","quadratic"];
    const svg = document.getElementById('chart');
    const chartTitle = document.getElementById('chartTitle');
    const optionsBox = document.getElementById('options');
    const feedback = document.getElementById('feedback');
    const newQuestionBtn = document.getElementById('newQuestionBtn');
    const revealBtn = document.getElementById('revealBtn');
    let current = null;
    let advanceTimer = null;

    function pickRandomRelationship(previous=null) {
      clearTimeout(advanceTimer);
      let next;
      if (relationships.length === 1) {
        next = relationships[0];
      } else {
        do { next = relationships[Math.floor(Math.random()*relationships.length)]; }
        while (previous && next === previous);
      }
      current = next;
      feedback.className = 'feedback';
      feedback.textContent = '';
      renderTitle(); renderChart(); renderOptions();
    }

    function renderTitle() {
      const xMeta = variableMap[current.x], yMeta = variableMap[current.y];
      const xUnitFull = unitMap[xMeta.unit], yUnitFull = unitMap[yMeta.unit];
      chartTitle.textContent = `${yMeta.label} (${yUnitFull}, ${yMeta.unit}) vs. ${xMeta.label} (${xUnitFull}, ${xMeta.unit})`;
    }

    function renderOptions() {
      optionsBox.innerHTML = '';
      answerOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'optionBtn';
        btn.textContent = opt;
        btn.addEventListener('click', () => checkAnswer(opt));
        optionsBox.appendChild(btn);
      });
    }

    function setOptionsDisabled(disabled) {
      document.querySelectorAll('.optionBtn').forEach(btn => btn.disabled = disabled);
    }

    function checkAnswer(choice) {
      clearTimeout(advanceTimer);
      if (choice === current.type) {
        feedback.className = 'feedback good';
        feedback.textContent = `Correct: this graph shows a ${current.type} relationship. Loading another relationship...`;
        setOptionsDisabled(true);
        const previous = current;
        advanceTimer = setTimeout(() => pickRandomRelationship(previous), 900);
      } else {
        feedback.className = 'feedback bad';
        feedback.textContent = `Not correct. You chose ${choice}. Try again.`;
      }
    }

    function revealAnswer() {
      clearTimeout(advanceTimer);
      feedback.className = 'feedback good';
      feedback.textContent = `Answer: ${current.type}`;
    }

    function makeSVG(tag, attrs={}, text='') {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
      if (text) el.textContent = text;
      return el;
    }

    function renderChart() {
      svg.innerHTML = '';
      const W=900,H=620,m={top:50,right:40,bottom:120,left:130};
      const plotW=W-m.left-m.right, plotH=H-m.top-m.bottom;
      const [xmin,xmax]=current.xRange, [ymin,ymax]=current.yRange;
      const xMeta=variableMap[current.x], yMeta=variableMap[current.y];
      const xUnitFull=unitMap[xMeta.unit], yUnitFull=unitMap[yMeta.unit];
      const xScale=x=>m.left+((x-xmin)/(xmax-xmin))*plotW;
      const yScale=y=>m.top+plotH-((y-ymin)/(ymax-ymin))*plotH;

      svg.appendChild(makeSVG('rect',{x:0,y:0,width:W,height:H,fill:'#fff'}));
      for(let i=0;i<=10;i++){
        const xVal=xmin+(i/10)*(xmax-xmin), xPix=xScale(xVal);
        svg.appendChild(makeSVG('line',{x1:xPix,y1:m.top,x2:xPix,y2:m.top+plotH,stroke:'#e5e7eb','stroke-width':1}));
      }
      for(let i=0;i<=10;i++){
        const yVal=ymin+(i/10)*(ymax-ymin), yPix=yScale(yVal);
        svg.appendChild(makeSVG('line',{x1:m.left,y1:yPix,x2:m.left+plotW,y2:yPix,stroke:'#e5e7eb','stroke-width':1}));
      }
      svg.appendChild(makeSVG('line',{x1:m.left,y1:m.top+plotH,x2:m.left+plotW,y2:m.top+plotH,stroke:'#111827','stroke-width':2.5}));
      svg.appendChild(makeSVG('line',{x1:m.left,y1:m.top,x2:m.left,y2:m.top+plotH,stroke:'#111827','stroke-width':2.5}));
      for(let i=0;i<=10;i++){
        const xVal=xmin+(i/10)*(xmax-xmin), xPix=xScale(xVal);
        svg.appendChild(makeSVG('line',{x1:xPix,y1:m.top+plotH,x2:xPix,y2:m.top+plotH+8,stroke:'#111827','stroke-width':2}));
        svg.appendChild(makeSVG('text',{x:xPix,y:m.top+plotH+26,'text-anchor':'middle','font-size':14,fill:'#111827'},tidyNumber(xVal)));
      }
      for(let i=0;i<=10;i++){
        const yVal=ymin+(i/10)*(ymax-ymin), yPix=yScale(yVal);
        svg.appendChild(makeSVG('line',{x1:m.left-8,y1:yPix,x2:m.left,y2:yPix,stroke:'#111827','stroke-width':2}));
        svg.appendChild(makeSVG('text',{x:m.left-14,y:yPix+5,'text-anchor':'end','font-size':14,fill:'#111827'},tidyNumber(yVal)));
      }
      const pathParts=[], points=[], steps=180;
      for(let i=0;i<=steps;i++){
        const x=xmin+(i/steps)*(xmax-xmin);
        let y=current.fn(x); y=Math.max(ymin,Math.min(ymax,y));
        const px=xScale(x), py=yScale(y);
        points.push([px,py]); pathParts.push((i===0?'M':'L')+px+' '+py);
      }
      svg.appendChild(makeSVG('path',{d:pathParts.join(' '),fill:'none',stroke:'#1d4ed8','stroke-width':4,'stroke-linejoin':'round','stroke-linecap':'round'}));
      for(let i=0;i<points.length;i+=20) svg.appendChild(makeSVG('circle',{cx:points[i][0],cy:points[i][1],r:4.5,fill:'#1d4ed8'}));
      svg.appendChild(makeSVG('text',{x:m.left+plotW/2,y:H-40,'text-anchor':'middle','font-size':20,'font-weight':'700',fill:'#111827'},`${xMeta.label} (${xMeta.unit})`));
      svg.appendChild(makeSVG('text',{x:42,y:m.top+plotH/2,transform:`rotate(-90 42 ${m.top+plotH/2})`,'text-anchor':'middle','font-size':20,'font-weight':'700',fill:'#111827'},`${yMeta.label} (${yMeta.unit})`));
    }

    function tidyNumber(n) { return (Math.abs(n)>=100 || Number.isInteger(n)) ? String(Math.round(n)) : n.toFixed(1).replace(/\.0$/,''); }
    newQuestionBtn.addEventListener('click',()=>pickRandomRelationship(current));
    revealBtn.addEventListener('click',revealAnswer);
    pickRandomRelationship();
  </script>
</body>
</html>
